name: Publish NuGet package

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PACKAGE_OUTPUT: ${{ github.workspace }}/artifacts/packages
  GITHUB_NUGET_SOURCE: https://nuget.pkg.github.com/DeltaZulu-OU/index.json

jobs:
  publish:
    name: Publish DeltaZulu.LocalStream NuGet package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Verify submodules
        shell: bash
        run: |
          status=0
          while read -r _ path; do
            mode=$(git ls-tree HEAD "$path" | awk '{print $1}')
            if [ "$mode" != "160000" ]; then
              echo "::error::'$path' is declared in .gitmodules but its tree entry is '${mode:-absent}' instead of a 160000 gitlink. The submodule pointer was probably lost in a rebase or merge; re-add it with 'git add $path' from a clone that has the submodule checked out."
              status=1
            elif [ ! -e "$path/.git" ]; then
              echo "::error::Submodule '$path' is not initialized in this checkout."
              status=1
            fi
          done < <(git config --file .gitmodules --get-regexp '^submodule\..*\.path$')
          exit $status

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - id: version
        name: Resolve package version
        shell: bash
        run: |
          set -euo pipefail
          source_version="$(dotnet msbuild src/DeltaZulu.LocalStream/DeltaZulu.LocalStream.csproj -getProperty:Version -nologo | tail -n 1)"
          if ! [[ "$source_version" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z]+([.-][0-9A-Za-z]+)*)?$ ]]; then
            echo "Version '$source_version' is not a supported SemVer package version." >&2
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "push" ]]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [[ "$tag_version" != "$source_version" ]]; then
              echo "Tag version '$tag_version' does not match source version '$source_version'." >&2
              exit 1
            fi
          fi

          echo "package_version=$source_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$source_version" >> "$GITHUB_OUTPUT"

      - name: Create release tag for manual dispatch
        if: github.event_name == 'workflow_dispatch'
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Tag '$RELEASE_TAG' already exists; update Directory.Build.props to an unpublished version." >&2
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag --annotate "$RELEASE_TAG" --message "Release $RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Restore packages
        run: dotnet restore DeltaZulu.LocalStream.slnx --locked-mode

      - name: Build solution
        run: dotnet build DeltaZulu.LocalStream.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test tests/DeltaZulu.LocalStream.Tests/DeltaZulu.LocalStream.Tests.csproj --configuration Release --no-build --no-restore

      - name: Pack library
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        run: dotnet pack src/DeltaZulu.LocalStream/DeltaZulu.LocalStream.csproj --configuration Release --no-build --no-restore --output "$PACKAGE_OUTPUT" /p:PackageVersion="$PACKAGE_VERSION"

      - name: Inspect package contents
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.package_version }}
        shell: bash
        run: |
          set -euo pipefail
          package="$PACKAGE_OUTPUT/DeltaZulu.LocalStream.$PACKAGE_VERSION.nupkg"
          unzip -l "$package"
          unzip -Z1 "$package" | grep -Fx README.md
          unzip -Z1 "$package" | grep -Fx LICENSE.txt
          unzip -Z1 "$package" | grep -Fx 'lib/net10.0/DeltaZulu.LocalStream.dll'
          ! unzip -Z1 "$package" | grep -E '(^|/)(DeltaZulu\.LocalStream\.Tests)(/|\.)'

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package-${{ steps.version.outputs.package_version }}
          path: ${{ env.PACKAGE_OUTPUT }}/*.nupkg
          if-no-files-found: error

      - name: Publish package to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          config="$RUNNER_TEMP/github-packages-nuget.config"
          dotnet new nugetconfig --output "$RUNNER_TEMP" --force
          mv "$RUNNER_TEMP/nuget.config" "$config"
          dotnet nuget add source \
            --username "${{ github.actor }}" \
            --password "$GITHUB_TOKEN" \
            --store-password-in-clear-text \
            --name github \
            --configfile "$config" \
            "$GITHUB_NUGET_SOURCE"
          dotnet nuget push "$PACKAGE_OUTPUT"/*.nupkg \
            --api-key "$GITHUB_TOKEN" \
            --configfile "$config" \
            --source github \
            --skip-duplicate
